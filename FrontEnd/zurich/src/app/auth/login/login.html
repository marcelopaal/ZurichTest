<div class="parent">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="login-container">
  <div class="login-card">

    <h3 class="text-center login-title mb-4">Iniciar Sesión</h3>

    <form>
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input type="text" [(ngModel)]="loginObj.usuario" name= "usuario" class="form-control" placeholder="Ingrese su usuario" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password"  [(ngModel)]="loginObj.password" name= "password" class="form-control" placeholder="Ingrese su contraseña" required>
      </div>

      <div class="d-grid mb-3">
        <button type="submit" (click)="onLogin()" class="btn btn-login">Ingresar</button>
      </div>

      <div class="text-center">
        <a href="#" class="text-decoration-none">Registrar usuario</a>
      </div>
    </form>

    <div class="text-center mt-4 footer-text">
      © 2026 Prueba Zurich
    </div>

  </div>
</div>

</div>
